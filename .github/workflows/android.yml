name: Android CI + APK release

# Two jobs:
#  - test:    every push / PR — the pure-JVM :core + engine seam tests (no Android SDK needed).
#  - apk:     builds the debug APK; on a version tag (v*) it publishes the APK to a GitHub Release
#             so users can download and install it straight from the Releases page.
#
# The debug APK is signed with the standard Android debug key, so it installs on any device with
# "install unknown apps" enabled — no keystore secret needed. It bundles ONNX Runtime for the
# Tier-A/B engines AND the CosyVoice3 native ggml runtime (built with -PwithCosyVoice — the apk job
# fetches the CrispASR sources and NDK-cross-compiles it). The espeak-ng bridge is still an opt-in
# native build (-PwithEspeak) and is not included (see docs/COSYVOICE2.md and
# docs/espeak-ng-integration.md).

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # the release job attaches the APK to a GitHub Release

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      # Core-only: the pure-JVM modules prove correctness with no Android SDK (spec §9).
      - name: Run seam tests + lint (core-only)
        run: ./gradlew -PskipApp=true :core:test ktlintCheck detekt --no-daemon

  apk:
    # Build the APK on branch pushes, tags and manual runs — not on PRs (the push build already
    # covers the branch). Whether it also *publishes* a Release is decided by the "Publish" step
    # below: pushes to main and version tags publish; feature-branch pushes only upload an artifact.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so app/build.gradle.kts can derive the version from commit count
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      # The CosyVoice3 native ggml runtime is shipped in the release APK (-PwithCosyVoice below).
      # It needs the NDK + CMake and the CrispASR source tree (fetched, not vendored). The four GGUF
      # weight stages are still downloaded at runtime into app-private storage, never bundled.
      - name: Install NDK + CMake for the native build
        run: sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Fetch CosyVoice native sources (CrispASR + ggml)
        run: sh scripts/fetch-cosyvoice-ggml.sh
      - name: Build debug APK (with CosyVoice native runtime)
        run: ./gradlew :app:assembleDebug -PwithCosyVoice=true --no-daemon
      - name: Resolve release tag
        id: rel
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "pre=false" >> "$GITHUB_OUTPUT"
          else
            # Auto-derive the version from the count of MERGES to main — first-parent commits, so each
            # merged PR bumps the patch by one and branch commits never inflate it (keep base/major_minor
            # in sync with VERSION_BASE_MERGES / VERSION_MAJOR_MINOR in app/build.gradle.kts). A push to
            # main publishes a real release; a manual workflow_dispatch on another branch publishes a
            # prerelease so a branch can be test-built without claiming "Latest".
            base=2; major_minor="0.1"
            count=$(git rev-list --count --first-parent HEAD)
            patch=$(( count - base )); [ "$patch" -lt 0 ] && patch=0
            echo "tag=v${major_minor}.${patch}" >> "$GITHUB_OUTPUT"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "pre=false" >> "$GITHUB_OUTPUT"
            else
              echo "pre=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Name the APK
        id: name
        run: |
          out="phonetts-${{ steps.rel.outputs.tag }}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$out"
          echo "apk=$out" >> "$GITHUB_OUTPUT"
      # Always keep the APK as a build artifact (downloadable from the Actions run page).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonetts-apk
          path: ${{ steps.name.outputs.apk }}
      # Publish the APK to a GitHub Release for one-click download on every push to main (each merge
      # bumps the patch, so each merge ships a new release) and on any version tag. A manual run on
      # another branch publishes a prerelease. Feature-branch pushes skip this and only keep the
      # artifact above. (The Actions GITHUB_TOKEN creates the tag + release.)
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          prerelease: ${{ steps.rel.outputs.pre }}
          name: PhoneTTS ${{ steps.rel.outputs.tag }}
          files: ${{ steps.name.outputs.apk }}
          body: |
            PhoneTTS ${{ steps.rel.outputs.tag }} — fully-offline on-device TTS.

            **Install:** download the `.apk` below, enable "install unknown apps" for your browser/files app, and open it.

            Debug-signed build (installs without a Play account). ONNX engines (Piper/Kokoro/Kitten/Melo)
            and the CosyVoice3 native runtime are included; espeak phonemization is an opt-in native build —
            see the README. Model weights download on first use into app-private storage.
